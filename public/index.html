<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification | Email + Mobile</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .container {
        background: white;
        border-radius: 2rem;
        padding: 2rem;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h1 {
        font-size: 1.8rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 0.5rem;
    }

    .subtitle {
        color: #6b7280;
        margin-bottom: 2rem;
        font-size: 0.9rem;
    }

    .tab-container {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        border-bottom: 2px solid #e5e7eb;
    }

    .tab {
        flex: 1;
        padding: 0.75rem;
        background: none;
        border: none;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        color: #6b7280;
        transition: all 0.3s;
        position: relative;
    }

    .tab.active {
        color: #667eea;
    }

    .tab.active::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #374151;
    }

    input {
        width: 100%;
        padding: 0.875rem;
        border: 2px solid #e5e7eb;
        border-radius: 1rem;
        font-size: 1rem;
        transition: all 0.3s;
        font-family: inherit;
    }

    input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
        width: 100%;
        padding: 0.875rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 1rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:active {
        transform: translateY(0);
    }

    .otp-section {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 2px solid #e5e7eb;
    }

    .message {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 0.75rem;
        text-align: center;
        font-weight: 500;
        animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .message.success {
        background: #d1fae5;
        color: #065f46;
    }

    .message.error {
        background: #fee2e2;
        color: #991b1b;
    }

    .demo-badge {
        background: #fef3c7;
        color: #92400e;
        padding: 0.5rem;
        border-radius: 0.5rem;
        font-size: 0.75rem;
        text-align: center;
        margin-top: 1rem;
    }

    .otp-display {
        background: #f3f4f6;
        padding: 0.5rem;
        border-radius: 0.5rem;
        font-family: monospace;
        font-size: 0.85rem;
        margin-top: 0.5rem;
        text-align: center;
    }
</style>
</head>
<body>
<div class="container">
    <h1>🔐 OTP Verification</h1>
    <p class="subtitle">Verify your identity securely</p>

    <div class="tab-container">
        <button class="tab active" onclick="switchTab('email')">📧 Email</button>
        <button class="tab" onclick="switchTab('mobile')">📱 Mobile</button>
    </div>

    <!-- Email Tab -->
    <div id="emailTab">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="emailInput" placeholder="Enter your email" value="">
        </div>
        <button onclick="sendEmailOTP()">📨 Send OTP</button>

        <div class="otp-section">
            <div class="form-group">
                <label>Enter OTP</label>
                <input type="text" id="emailOtp" placeholder="6-digit code" maxlength="6">
            </div>
            <button onclick="verifyEmailOTP()">✓ Verify Email</button>
        </div>
    </div>

    <!-- Mobile Tab -->
    <div id="mobileTab" style="display: none;">
        <div class="form-group">
            <label>Mobile Number</label>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="countryCode" placeholder="+91" value="+91" style="width: 80px;">
                <input type="tel" id="mobileInput" placeholder="9611459960" value="9611459960">
            </div>
        </div>
        <button onclick="sendMobileOTP()">📱 Send OTP</button>

        <div class="otp-section">
            <div class="form-group">
                <label>Enter OTP</label>
                <input type="text" id="mobileOtp" placeholder="6-digit code" maxlength="6">
            </div>
            <button onclick="verifyMobileOTP()">✓ Verify Mobile</button>
        </div>
    </div>

    <div id="message"></div>
    <div id="demoInfo" class="demo-badge" style="display: none;"></div>
</div>

<script>
    let currentDemoOtp = null;

    function switchTab(tab) {
        const emailTab = document.getElementById('emailTab');
        const mobileTab = document.getElementById('mobileTab');
        const tabs = document.querySelectorAll('.tab');
        
        if (tab === 'email') {
            emailTab.style.display = 'block';
            mobileTab.style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            emailTab.style.display = 'none';
            mobileTab.style.display = 'block';
            tabs[0].classList.remove('active');
            tabs[1].classList.add('active');
        }
        clearMessage();
    }

    function showMessage(msg, isSuccess) {
        const messageDiv = document.getElementById('message');
        messageDiv.innerHTML = `<div class="message ${isSuccess ? 'success' : 'error'}">${msg}</div>`;
        setTimeout(() => {
            if (messageDiv.innerHTML === `<div class="message ${isSuccess ? 'success' : 'error'}">${msg}</div>`) {
                messageDiv.innerHTML = '';
            }
        }, 5000);
    }

    function clearMessage() {
        document.getElementById('message').innerHTML = '';
    }

    async function sendEmailOTP() {
        const email = document.getElementById('emailInput').value;
        
        if (!email) {
            showMessage('Please enter email address', false);
            return;
        }

        try {
            const response = await fetch('http://localhost:5000/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showMessage(`✅ ${data.message}`, true);
            } else {
                showMessage(`❌ ${data.message}`, false);
            }
        } catch (error) {
            showMessage('❌ Server error. Make sure backend is running on port 5000', false);
        }
    }

    async function verifyEmailOTP() {
        const email = document.getElementById('emailInput').value;
        const otp = document.getElementById('emailOtp').value;
        
        if (!otp) {
            showMessage('Please enter OTP', false);
            return;
        }

        try {
            const response = await fetch('http://localhost:5000/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showMessage(`✅ ${data.message}`, true);
                document.getElementById('emailOtp').value = '';
            } else {
                showMessage(`❌ ${data.message}`, false);
            }
        } catch (error) {
            showMessage('❌ Server error', false);
        }
    }

    async function sendMobileOTP() {
        const countryCode = document.getElementById('countryCode').value;
        const mobile = document.getElementById('mobileInput').value;
        const fullMobile = countryCode + mobile;
        
        if (!mobile) {
            showMessage('Please enter mobile number', false);
            return;
        }

        try {
            const response = await fetch('http://localhost:5000/send-sms-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobile: fullMobile, countryCode, number: mobile })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showMessage(`✅ ${data.message}`, true);
                if (data.demoOtp) {
                    currentDemoOtp = data.demoOtp;
                    const demoDiv = document.getElementById('demoInfo');
                    demoDiv.style.display = 'block';
                    demoDiv.innerHTML = `🔑 Demo Mode - Your OTP is: <strong>${data.demoOtp}</strong><br>(Check server console also)`;
                    setTimeout(() => {
                        if (demoDiv.innerHTML.includes(data.demoOtp)) {
                            demoDiv.style.display = 'none';
                        }
                    }, 10000);
                }
            } else {
                showMessage(`❌ ${data.message}`, false);
            }
        } catch (error) {
            showMessage('❌ Server error. Make sure backend is running on port 5000', false);
        }
    }

    async function verifyMobileOTP() {
        const countryCode = document.getElementById('countryCode').value;
        const mobile = document.getElementById('mobileInput').value;
        const otp = document.getElementById('mobileOtp').value;
        const fullMobile = countryCode + mobile;
        
        if (!otp) {
            showMessage('Please enter OTP', false);
            return;
        }

        try {
            const response = await fetch('http://localhost:5000/verify-sms-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobile: fullMobile, otp, countryCode, number: mobile })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showMessage(`✅ ${data.message}`, true);
                document.getElementById('mobileOtp').value = '';
                document.getElementById('demoInfo').style.display = 'none';
            } else {
                showMessage(`❌ ${data.message}`, false);
            }
        } catch (error) {
            showMessage('❌ Server error', false);
        }
    }
</script>
</body>
</html>
