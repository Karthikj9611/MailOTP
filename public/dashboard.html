<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Verified</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .container {
        background: white;
        border-radius: 2rem;
        padding: 2rem;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h1 {
        font-size: 1.8rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 0.5rem;
    }

    .welcome-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 1.5rem;
        border-radius: 1rem;
        margin-bottom: 1.5rem;
    }

    .welcome-card h3 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
    }

    .user-info {
        background: #f9fafb;
        padding: 1.5rem;
        border-radius: 1rem;
        margin-bottom: 1.5rem;
    }

    .info-row {
        display: flex;
        padding: 0.75rem 0;
        border-bottom: 1px solid #e5e7eb;
    }

    .info-row:last-child {
        border-bottom: none;
    }

    .info-label {
        flex: 1;
        font-weight: 600;
        color: #6b7280;
    }

    .info-value {
        flex: 2;
        color: #374151;
    }

    .badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
    }

    .badge.email {
        background: #dbeafe;
        color: #1e40af;
    }

    .badge.mobile {
        background: #dcfce7;
        color: #166534;
    }

    .dashboard-stats {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
    }

    .stat-card {
        background: #f9fafb;
        padding: 1rem;
        border-radius: 1rem;
        text-align: center;
    }

    .stat-value {
        font-size: 1.5rem;
        font-weight: 700;
        color: #667eea;
    }

    .stat-label {
        color: #6b7280;
        font-size: 0.8rem;
        margin-top: 0.25rem;
    }

    .logout-btn {
        width: 100%;
        padding: 0.875rem;
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
        border: none;
        border-radius: 1rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .logout-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
    }

    .logout-btn:active {
        transform: translateY(0);
    }

    .recent-activity {
        background: #f9fafb;
        padding: 1.5rem;
        border-radius: 1rem;
        margin-bottom: 1.5rem;
    }

    .activity-item {
        display: flex;
        align-items: center;
        padding: 0.5rem 0;
        color: #6b7280;
        font-size: 0.9rem;
    }

    .activity-icon {
        margin-right: 0.75rem;
        font-size: 1.2rem;
    }
</style>
</head>
<body>
<div class="container">
    <h1>📊 Dashboard</h1>
    
    <div class="welcome-card">
        <h3>👋 Welcome!</h3>
        <p>You've successfully verified your identity</p>
    </div>

    <div class="user-info">
        <div class="info-row">
            <span class="info-label">Verification Method</span>
            <span class="info-value">
                <span class="badge email" id="verifyBadge">✓ Verified</span>
            </span>
        </div>
        <div class="info-row">
            <span class="info-label">Email</span>
            <span class="info-value" id="userEmail">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Mobile</span>
            <span class="info-value" id="userMobile">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Login Time</span>
            <span class="info-value" id="loginTime">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Session ID</span>
            <span class="info-value" id="sessionId">-</span>
        </div>
    </div>

    <div class="dashboard-stats">
        <div class="stat-card">
            <div class="stat-value" id="sessionMinutes">0</div>
            <div class="stat-label">Minutes Active</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">✓</div>
            <div class="stat-label">Verified</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">🔒</div>
            <div class="stat-label">Secure</div>
        </div>
    </div>

    <div class="recent-activity">
        <h4 style="margin-bottom: 1rem; color: #374151;">📋 Recent Activity</h4>
        <div class="activity-item">
            <span class="activity-icon">✅</span>
            <span>Account verified successfully</span>
        </div>
        <div class="activity-item">
            <span class="activity-icon">🔐</span>
            <span>Secure session established</span>
        </div>
        <div class="activity-item">
            <span class="activity-icon">📱</span>
            <span>Dashboard accessed</span>
        </div>
    </div>

    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
</div>

<script>
    // Check if user is verified
    const userData = localStorage.getItem('verifiedUser');
    
    if (!userData) {
        // Not verified, redirect to login
        window.location.href = '/';
    }

    const user = JSON.parse(userData);
    let sessionStart = Date.now();
    let timerInterval;

    // Display user info
    document.getElementById('userEmail').textContent = user.email || '-';
    document.getElementById('userMobile').textContent = user.mobile || '-';
    
    // Set badge text
    const badge = document.getElementById('verifyBadge');
    if (user.type === 'email') {
        badge.textContent = '📧 Email Verified';
        badge.className = 'badge email';
    } else {
        badge.textContent = '📱 Mobile Verified';
        badge.className = 'badge mobile';
    }

    // Set login time
    const loginTime = new Date(user.timestamp).toLocaleString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
    });
    document.getElementById('loginTime').textContent = loginTime;

    // Generate session ID
    const sessionId = 'SESS_' + Math.random().toString(36).substr(2, 9).toUpperCase();
    document.getElementById('sessionId').textContent = sessionId;

    // Update session timer
    function updateTimer() {
        const elapsed = Math.floor((Date.now() - sessionStart) / 60000);
        document.getElementById('sessionMinutes').textContent = elapsed;
    }
    updateTimer();
    timerInterval = setInterval(updateTimer, 60000); // Update every minute

    // Logout function
    function logout() {
        clearInterval(timerInterval);
        localStorage.removeItem('verifiedUser');
        window.location.href = '/';
    }

    // Prevent back button after logout
    window.addEventListener('pageshow', function(event) {
        if (!localStorage.getItem('verifiedUser')) {
            window.location.href = '/';
        }
    });
</script>
</body>
</html>
